<svg width="1196" height="288" viewBox="102 56 1196 288" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Muhammad Asjad Midnight Gold Futuristic Header</title>
  <desc id="desc">Animated futuristic Midnight Gold GitHub README hero header for Muhammad Asjad.</desc>

  <defs>
    <!-- Background -->
    <linearGradient id="midnightBg" x1="0" y1="0" x2="1400" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="30%" stop-color="#111827"/>
      <stop offset="66%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#292524"/>
      <animate attributeName="x1" values="0;80;0" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1400;1320;1400" dur="14s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Name gradient -->
    <linearGradient id="goldName" x1="250" y1="90" x2="1140" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FEFCE8"/>
      <stop offset="22%" stop-color="#FFF7C2"/>
      <stop offset="48%" stop-color="#FDE68A"/>
      <stop offset="72%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#F59E0B"/>
      <animate attributeName="x1" values="250;350;250" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1140;1040;1140" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Line gradient -->
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FACC15" stop-opacity="0"/>
      <stop offset="20%" stop-color="#FACC15"/>
      <stop offset="50%" stop-color="#FDE68A"/>
      <stop offset="80%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>

    <!-- Shimmer -->
    <linearGradient id="shimmer" x1="-450" y1="0" x2="-140" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="42%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.90"/>
      <stop offset="58%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
      <animate attributeName="x1" values="-450;1220" dur="5.2s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-140;1530" dur="5.2s" begin="1.6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Glows -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FACC15" stop-opacity="0.34"/>
      <stop offset="40%" stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="leftGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FACC15" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#FACC15" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FACC15" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="rightGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#F59E0B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="nameGlow" x="-30%" y="-55%" width="160%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FDE68A" flood-opacity="0.30"/>
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#F59E0B" flood-opacity="0.26"/>
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.40"/>
    </filter>

    <filter id="softGoldGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#FACC15" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#F59E0B" flood-opacity="0.24"/>
    </filter>

    <filter id="badgeGlow" x="-40%" y="-60%" width="180%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FACC15" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#F59E0B" flood-opacity="0.18"/>
    </filter>

    <!-- Patterns -->
    <pattern id="fineGrid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>

    <pattern id="dotGrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.25" fill="#FACC15" fill-opacity="0.25"/>
    </pattern>

    <clipPath id="heroClip">
      <rect x="102" y="56" width="1196" height="288" rx="30"/>
    </clipPath>

    <clipPath id="subtitleReveal">
      <rect x="350" y="238" width="0" height="42" rx="4">
        <animate attributeName="width" values="0;705" dur="1.35s" begin="1.05s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <g clip-path="url(#heroClip)">
    <!-- Base -->
    <rect width="1400" height="460" fill="url(#midnightBg)"/>
    <rect width="1400" height="460" fill="url(#fineGrid)" opacity="0.68"/>

    <!-- Background glow -->
    <circle cx="700" cy="195" r="235" fill="url(#centerGlow)">
      <animate attributeName="r" values="225;250;225" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="7s" repeatCount="indefinite"/>
    </circle>

    <circle cx="205" cy="180" r="165" fill="url(#leftGlow)">
      <animate attributeName="cx" values="205;235;205" dur="10s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1188" cy="180" r="170" fill="url(#rightGlow)">
      <animate attributeName="cx" values="1188;1155;1188" dur="10s" repeatCount="indefinite"/>
    </circle>

    <!-- HUD circles -->
    <g opacity="0.34" filter="url(#softGoldGlow)">
      <g transform="rotate(0 700 190)">
        <circle cx="700" cy="190" r="120" stroke="#F59E0B" stroke-opacity="0.25" stroke-width="1.4" stroke-dasharray="4 12"/>
        <animateTransform attributeName="transform" type="rotate" from="0 700 190" to="360 700 190" dur="42s" repeatCount="indefinite"/>
      </g>

      <g transform="rotate(0 700 190)">
        <circle cx="700" cy="190" r="148" stroke="#FACC15" stroke-opacity="0.18" stroke-width="1.2" stroke-dasharray="80 34 16 38"/>
        <animateTransform attributeName="transform" type="rotate" from="360 700 190" to="0 700 190" dur="36s" repeatCount="indefinite"/>
      </g>

      <g transform="rotate(0 700 190)">
        <circle cx="700" cy="190" r="178" stroke="#FDE68A" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="2 9"/>
        <animateTransform attributeName="transform" type="rotate" from="0 700 190" to="360 700 190" dur="56s" repeatCount="indefinite"/>
      </g>

      <line x1="700" y1="64" x2="700" y2="318" stroke="#FDE68A" stroke-opacity="0.10" stroke-width="1"/>
      <line x1="535" y1="190" x2="865" y2="190" stroke="#FDE68A" stroke-opacity="0.10" stroke-width="1"/>
    </g>

    <!-- Dots -->
    <g opacity="0.28">
      <rect x="260" y="135" width="70" height="68" fill="url(#dotGrid)"/>
      <rect x="870" y="94" width="70" height="68" fill="url(#dotGrid)"/>
      <rect x="1038" y="256" width="70" height="60" fill="url(#dotGrid)"/>
    </g>

    <!-- Main border -->
    <rect x="102.5" y="56.5" width="1195" height="287" rx="29.5" stroke="#FDE68A" stroke-opacity="0.10"/>

    <!-- FIXED CORNER BRACKETS - closer to border -->
    <g opacity="0.9">
      <!-- top left -->
      <path d="M118 94V74L142 58H292" stroke="#FACC15" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- top right -->
      <path d="M1282 94V74L1258 58H1108" stroke="#FACC15" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- bottom left -->
      <path d="M118 306V326L142 342H292" stroke="#FACC15" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- bottom right -->
      <path d="M1282 306V326L1258 342H1108" stroke="#FACC15" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Edge tech lines -->
    <g opacity="0.5">
      <path d="M160 66H305L323 78H430L442 88H610" stroke="#F59E0B" stroke-width="1"/>
      <path d="M1240 66H1095L1077 78H970L958 88H790" stroke="#F59E0B" stroke-width="1"/>
      <path d="M160 334H300L320 322H430L444 312H610" stroke="#F59E0B" stroke-width="1"/>
      <path d="M1240 334H1100L1080 322H970L956 312H790" stroke="#F59E0B" stroke-width="1"/>
    </g>

    <!-- FIXED SYSTEM ONLINE BADGE -->
   <g opacity="0" filter="url(#badgeGlow)">
  <animate 
    attributeName="opacity" 
    values="0;1;0.25;1;0.4;1;0.55;1" 
    keyTimes="0;0.12;0.23;0.38;0.52;0.68;0.84;1" 
    dur="1.35s" 
    begin="0s" 
    fill="freeze"
  />

  <!-- compact badge -->
  <path 
    d="M150 96L164 86H385L397 98V120L385 132H164L150 121V96Z"
    fill="#0B0F14" 
    fill-opacity="0.72" 
    stroke="#FACC15" 
    stroke-width="1.6"
  />

  <!-- smaller icon hex -->
  <path 
    d="M174 97L190 88L206 97V115L190 124L174 115V97Z"
    stroke="#FACC15" 
    stroke-width="1.4" 
    fill="#111827" 
    fill-opacity="0.32"
  />

  <!-- pulse line inside hex -->
  <path 
    d="M180 106H185L189 99L194 115L198 106H203"
    stroke="#FDE68A" 
    stroke-width="1.3" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />

  <!-- glow dot -->
  <circle cx="220" cy="109" r="5.2" fill="#FACC15">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4.5;6;4.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- compact text -->
  <text 
    x="305" 
    y="115"
    text-anchor="middle"
    font-family="'JetBrains Mono', 'SFMono-Regular', Consolas, monospace"
    font-size="13.5"
    font-weight="800"
    letter-spacing="1.25"
    fill="#FDE68A">
    SYSTEM ONLINE
  </text>
</g>

    <!-- Left circuits -->
    <g opacity="0.68" stroke-linecap="round" stroke-linejoin="round">
      <path d="M102 184H152L182 216H260L282 202H350" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="10 8">
        <animate attributeName="stroke-dashoffset" values="0;-90" dur="5s" repeatCount="indefinite"/>
      </path>
      <path d="M102 210H198L225 240H315L338 224H395" stroke="#FACC15" stroke-width="1.8" stroke-dasharray="10 7">
        <animate attributeName="stroke-dashoffset" values="0;-95" dur="4.4s" repeatCount="indefinite"/>
      </path>
      <path d="M102 252H200L260 220H350" stroke="#F59E0B" stroke-width="1.4"/>
      <path d="M102 286H235L270 268H360" stroke="#F59E0B" stroke-width="1.2"/>
      <circle cx="260" cy="216" r="3.5" fill="#FACC15" filter="url(#softGoldGlow)"/>
      <circle cx="315" cy="240" r="3.5" fill="#FACC15" filter="url(#softGoldGlow)"/>
      <circle cx="350" cy="220" r="3.2" fill="#FACC15" filter="url(#softGoldGlow)"/>
    </g>

    <!-- Right circuits -->
    <g opacity="0.68" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1298 184H1248L1218 216H1140L1118 202H1050" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="10 8">
        <animate attributeName="stroke-dashoffset" values="0;90" dur="5s" repeatCount="indefinite"/>
      </path>
      <path d="M1298 210H1202L1175 240H1085L1062 224H1005" stroke="#FACC15" stroke-width="1.8" stroke-dasharray="10 7">
        <animate attributeName="stroke-dashoffset" values="0;95" dur="4.4s" repeatCount="indefinite"/>
      </path>
      <path d="M1298 252H1200L1140 220H1050" stroke="#F59E0B" stroke-width="1.4"/>
      <path d="M1298 286H1165L1130 268H1040" stroke="#F59E0B" stroke-width="1.2"/>
      <circle cx="1140" cy="216" r="3.5" fill="#FACC15" filter="url(#softGoldGlow)"/>
      <circle cx="1085" cy="240" r="3.5" fill="#FACC15" filter="url(#softGoldGlow)"/>
      <circle cx="1050" cy="220" r="3.2" fill="#FACC15" filter="url(#softGoldGlow)"/>
    </g>

    <!-- Small UI decorations -->
    <g opacity="0.52" filter="url(#softGoldGlow)">
      <path d="M492 104H516M504 92V116" stroke="#FACC15" stroke-width="1.3"/>
      <path d="M1116 104H1140M1128 92V116" stroke="#FACC15" stroke-width="1.3"/>
      <path d="M310 308H334M322 296V320" stroke="#FACC15" stroke-width="1.3"/>
      <path d="M1148 280H1172M1160 268V292" stroke="#FACC15" stroke-width="1.3"/>
      <path d="M925 70L930 62H938L933 70H925ZM938 70L943 62H951L946 70H938ZM951 70L956 62H964L959 70H951ZM964 70L969 62H977L972 70H964Z" fill="#FACC15"/>
    </g>

    <!-- Name -->
    <text x="700" y="198"
          text-anchor="middle"
          font-family="Orbitron, 'Space Grotesk', 'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="78"
          font-weight="900"
          letter-spacing="-1.2"
          fill="url(#goldName)"
          filter="url(#nameGlow)"
          opacity="0">
      Muhammad Asjad
      <animate attributeName="opacity" values="0;1" dur="0.85s" begin="0.22s" fill="freeze"/>
      <animate attributeName="y" values="216;198" dur="0.85s" begin="0.22s" fill="freeze"/>
      <animate attributeName="letter-spacing" values="2;-1.2" dur="0.85s" begin="0.22s" fill="freeze"/>
    </text>

    <text x="700" y="198"
          text-anchor="middle"
          font-family="Orbitron, 'Space Grotesk', 'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="78"
          font-weight="900"
          letter-spacing="-1.2"
          fill="url(#shimmer)"
          opacity="0.30"
          pointer-events="none">
      Muhammad Asjad
    </text>

    <!-- Divider -->
    <g filter="url(#softGoldGlow)" opacity="0.92">
      <rect x="300" y="224" width="0" height="2" rx="1" fill="url(#goldStroke)">
        <animate attributeName="width" values="0;800" dur="1.05s" begin="0.92s" fill="freeze"/>
      </rect>

      <path d="M670 224H688L700 238L712 224H730" stroke="#FDE68A" stroke-width="2" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.7s" begin="1.15s" fill="freeze"/>
      </path>
    </g>

    <!-- Subtitle -->
    <g clip-path="url(#subtitleReveal)">
      <text x="700" y="270"
            text-anchor="middle"
            font-family="'JetBrains Mono', 'SFMono-Regular', Consolas, monospace"
            font-size="22"
            font-weight="500"
            letter-spacing="1.5"
            fill="#FEF3C7"
            opacity="0.96">
        React Native Developer • Mobile + Web3 Builder
      </text>
    </g>

    <rect x="350" y="245" width="3" height="30" rx="1.5" fill="#FACC15" opacity="0" filter="url(#softGoldGlow)">
      <animate attributeName="opacity" values="0;1;1;0" dur="1.58s" begin="1.02s" fill="freeze"/>
      <animate attributeName="x" values="350;1055" dur="1.35s" begin="1.05s" fill="freeze"/>
    </rect>

    <!-- Bottom equalizer -->
    <g transform="translate(650 328)" filter="url(#softGoldGlow)" opacity="0.82">
      <rect x="0" y="0" width="4" height="10" rx="1" fill="#FACC15"><animate attributeName="height" values="7;18;7" dur="1.2s" begin="0s" repeatCount="indefinite"/><animate attributeName="y" values="3;-5;3" dur="1.2s" begin="0s" repeatCount="indefinite"/></rect>
      <rect x="10" y="0" width="4" height="10" rx="1" fill="#FACC15"><animate attributeName="height" values="7;18;7" dur="1.2s" begin="0.1s" repeatCount="indefinite"/><animate attributeName="y" values="3;-5;3" dur="1.2s" begin="0.1s" repeatCount="indefinite"/></rect>
      <rect x="20" y="0" width="4" height="10" rx="1" fill="#FACC15"><animate attributeName="height" values="7;18;7" dur="1.2s" begin="0.2s" repeatCount="indefinite"/><animate attributeName="y" values="3;-5;3" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></rect>
      <rect x="30" y="0" width="4" height="10" rx="1" fill="#FACC15"><animate attributeName="height" values="7;18;7" dur="1.2s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="y" values="3;-5;3" dur="1.2s" begin="0.3s" repeatCount="indefinite"/></rect>
      <rect x="40" y="0" width="4" height="10" rx="1" fill="#FACC15"><animate attributeName="height" values="7;18;7" dur="1.2s" begin="0.4s" repeatCount="indefinite"/><animate attributeName="y" values="3;-5;3" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></rect>
      <rect x="50" y="0" width="4" height="10" rx="1" fill="#FACC15"><animate attributeName="height" values="7;18;7" dur="1.2s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="y" values="3;-5;3" dur="1.2s" begin="0.5s" repeatCount="indefinite"/></rect>
      <rect x="60" y="0" width="4" height="10" rx="1" fill="#FACC15"><animate attributeName="height" values="7;18;7" dur="1.2s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="y" values="3;-5;3" dur="1.2s" begin="0.6s" repeatCount="indefinite"/></rect>
      <rect x="70" y="0" width="4" height="10" rx="1" fill="#FACC15"><animate attributeName="height" values="7;18;7" dur="1.2s" begin="0.7s" repeatCount="indefinite"/><animate attributeName="y" values="3;-5;3" dur="1.2s" begin="0.7s" repeatCount="indefinite"/></rect>
      <rect x="80" y="0" width="4" height="10" rx="1" fill="#FACC15"><animate attributeName="height" values="7;18;7" dur="1.2s" begin="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="3;-5;3" dur="1.2s" begin="0.8s" repeatCount="indefinite"/></rect>
      <rect x="90" y="0" width="4" height="10" rx="1" fill="#FACC15"><animate attributeName="height" values="7;18;7" dur="1.2s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="3;-5;3" dur="1.2s" begin="0.9s" repeatCount="indefinite"/></rect>
    </g>

    <!-- Scan light -->
    <rect x="-310" y="0" width="170" height="460" fill="#FFFFFF" opacity="0.04" transform="skewX(-15)">
      <animate attributeName="x" values="-310;1530" dur="7.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Bottom shadows -->
    <path d="M0 370C165 336 340 391 538 365C731 340 860 305 1047 326C1193 343 1294 352 1400 336V460H0V370Z" fill="#020617" opacity="0.42"/>
    <path d="M0 398C180 364 364 409 560 388C754 367 885 348 1068 365C1207 378 1307 388 1400 377V460H0V398Z" fill="#020617" opacity="0.78"/>
  </g>
</svg>
